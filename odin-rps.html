<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="rps-styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans" />
    <script src="rps-script.js" defer></script>
    <title>Odin RPS</title>
  </head>
  <body>
    <main>
      <div class="intro-container">
        <h1>Welcome to Odin RPS!</h1>
        <p>Rock Paper Scissors built with basic HTML, CSS, and JavaScript.</p>
      </div>
      <!-- GAME CONTAINER -->
      <div id="game-container">
        <!-- BUTTONS CONTAINER -->
        <div data-endView="hide" class="buttons-container">
          <!-- CHOICE BUTTONS -->
          <div class="choices-container" id="selections">
            <button class="choice-btn" id="r">Rock</button>
            <button class="choice-btn" id="p">Paper</button>
            <button class="choice-btn" id="s">Scissors</button>
          </div>
          <!-- PLAY/RESET/END BUTTONS -->
          <div class="controls-container">
            <button class="control-btn hidden" id="submit">Submit</button>
            <button class="control-btn hidden" id="reset">Reset</button>
            <button class="control-btn" id="end">End</button>
          </div>
        </div>
        <!-- DISPLAYS CONTAINER -->
        <div class="displays-container">
          <!-- MESSAGE DISPLAY -->
          <div class="message-container">
            <p class="message" id="round-number">
              Round <span class="round-label" id="round-value">1</span>
            </p>
            <p class="message" id="message-text">Display message goes here.</p>
          </div>
          <!--SCOREBOARD -->
          <div class="scoreboard-container">
            <div class="sbCard">
              <span class="sbLabel">WINS:</span>
              <span class="sbValue" id="wins">1</span>
            </div>

            <div class="sbCard">
              <span class="sbLabel">LOSSES:</span>
              <span class="sbValue" id="losses">1</span>
            </div>

            <div class="sbCard">
              <span class="sbLabel">DRAWS:</span>
              <span class="sbValue" id="ties">1</span>
            </div>

            <div class="sbCard">
              <span class="sbLabel">WIN PCT:</span>
              <span class="sbValue" id="win-pct">50</span>%
            </div>
          </div>
        </div>
      </div>
      <!-- END GAME CONTAINER -->
    </main>
  </body>
</html>
