<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="rps-styles.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans" />
    <script src="rps-script.js" defer></script>
    <title>Odin RPS</title>
  </head>
  <body>
    <main>
      <h1>Welcome to Odin RPS!</h1>
      <p class="intro">This is Rock Paper Scissors game built with basic HTML, CSS, and JavaScript.</p>
      <button id="begin-btn">Begin Game</button>
      <div id="game-container" class="hidden">
        <div class="choices">
          <button class="choice-btn" data-choice="rock">Rock</button>
          <button class="choice-btn" data-choice="paper">Paper</button>
          <button class="choice-btn" data-choice="scissors">Scissors</button>
        </div>
        <div id="result"></div>
      </div>
        <div class="scoreboard">
            <p>Player Score: <span id="player-score">0</span></p>
            <p>Computer Score: <span id="computer-score">0</span></p>
        </div>
  </body>
</html>
